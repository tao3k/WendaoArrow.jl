name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
      - "!dependabot/**"
    tags:
      - "**"

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.nthreads }} threads - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12"
          - "pre"
        os:
          - ubuntu-latest
          - macos-latest
        nthreads:
          - 1
          - 2
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - name: Install source build toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool pkg-config
      - uses: julia-actions/julia-buildpkg@v1.6
        with:
          project: .
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: ${{ matrix.nthreads }}
        with:
          project: .

  flight_grpcserver:
    name: Flight gRPC server - Julia 1.12 - ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Flight Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow grpcio grpcio-tools
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-flight-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-flight-${{ env.cache-name }}-
            ${{ runner.os }}-flight-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - uses: julia-actions/julia-buildpkg@v1.6
        with:
          project: .
      - name: Run Flight gRPC server tests
        env:
          ARROW_FLIGHT_PYTHON: ${{ env.pythonLocation }}/bin/python
          JULIA_NUM_THREADS: "1"
        run: >
          julia --color=yes --project=. -e 'using Pkg;
          Pkg.test(; coverage=false, test_args=["flight_grpcserver"])'
