name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
      - "!dependabot/**"
    tags:
      - "**"

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.nthreads }} threads - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12"
          - "pre"
        os:
          - ubuntu-latest
          - macos-latest
        nthreads:
          - 1
          - 2
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - name: Install source build toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool pkg-config
      - name: Resolve and build package
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.resolve(); Pkg.instantiate(); Pkg.build()'
      - name: Run package tests
        env:
          JULIA_NUM_THREADS: ${{ matrix.nthreads }}
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.test("WendaoArrow"; coverage=false)'

  packaged-flight-stress:
    name: Packaged Flight stress - ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ubuntu-stress-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ubuntu-stress-${{ env.cache-name }}-
            ubuntu-stress-
      - name: Install source build toolchain (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - name: Install Python Flight client
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow
      - name: Resolve and build package
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.resolve(); Pkg.instantiate(); Pkg.build()'
      - name: Run packaged Flight stress lane
        env:
          JULIA_NUM_THREADS: "2"
          WENDAO_ARROW_STRESS_WORKERS: "4"
          WENDAO_ARROW_STRESS_SAMPLES: "4"
          WENDAO_ARROW_STRESS_REQUEST_ROWS: "32"
          WENDAO_ARROW_STRESS_DOC_BYTES: "2097152"
          WENDAO_ARROW_STRESS_MAX_ACTIVE_REQUESTS: "8"
          WENDAO_ARROW_STRESS_PROCESSING_DELAY_MS: "5"
        run: |
          chmod +x ./scripts/test_packaged_flight_stress.sh
          ./scripts/test_packaged_flight_stress.sh
