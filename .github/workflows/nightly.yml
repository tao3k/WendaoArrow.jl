name: Nightly

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  test:
    name: Julia nightly - ${{ matrix.os }} - ${{ matrix.nthreads }} threads - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        nthreads:
          - 1
          - 2
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: nightly
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-nightly-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-nightly-${{ env.cache-name }}-
            ${{ runner.os }}-nightly-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - uses: julia-actions/julia-buildpkg@v1.6
        with:
          project: .
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: ${{ matrix.nthreads }}
        with:
          project: .

  flight_grpcserver:
    name: Flight gRPC server - Julia nightly - ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Flight Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow grpcio grpcio-tools
      - uses: julia-actions/setup-julia@v2
        with:
          version: nightly
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-nightly-flight-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-nightly-flight-${{ env.cache-name }}-
            ${{ runner.os }}-nightly-flight-
            ${{ runner.os }}-nightly-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - uses: julia-actions/julia-buildpkg@v1.6
        with:
          project: .
      - name: Run Flight gRPC server tests
        env:
          ARROW_FLIGHT_PYTHON: ${{ env.pythonLocation }}/bin/python
          JULIA_NUM_THREADS: "1"
        run: >
          julia --color=yes --project=. -e 'using Pkg;
          Pkg.test(; coverage=false, test_args=["flight_grpcserver"])'
