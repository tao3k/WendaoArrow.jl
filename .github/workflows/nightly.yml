name: Nightly

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  test:
    name: Julia nightly - ${{ matrix.os }} - ${{ matrix.nthreads }} threads - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        nthreads:
          - 1
          - 2
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: nightly
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-nightly-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-nightly-${{ env.cache-name }}-
            ${{ runner.os }}-nightly-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - uses: julia-actions/julia-buildpkg@v1.6
        with:
          project: .
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: ${{ matrix.nthreads }}
        with:
          project: .
