name: Nightly

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  test:
    name: Julia nightly - ${{ matrix.os }} - ${{ matrix.nthreads }} threads - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        nthreads:
          - 1
          - 2
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: nightly
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-nightly-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-nightly-${{ env.cache-name }}-
            ${{ runner.os }}-nightly-
            ${{ runner.os }}-
      - name: Install source build toolchain (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - name: Ensure General registry
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia -e 'using Pkg; try Pkg.Registry.add(Pkg.Registry.RegistrySpec(name="General")); catch err; msg = sprint(showerror, err); occursin("already installed", msg) || occursin("already exists", msg) || rethrow(); end'
      - name: Resolve and build package
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.resolve(); Pkg.instantiate(); Pkg.build()'
      - name: Run package tests
        env:
          JULIA_NUM_THREADS: ${{ matrix.nthreads }}
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.test("WendaoArrow"; coverage=false)'

  packaged-flight-stress:
    name: Nightly packaged Flight stress - ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: nightly
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ubuntu-nightly-stress-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ubuntu-nightly-stress-${{ env.cache-name }}-
            ubuntu-nightly-stress-
      - name: Install source build toolchain (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config
      - name: Install Python Flight client
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow
      - name: Ensure General registry
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia -e 'using Pkg; try Pkg.Registry.add(Pkg.Registry.RegistrySpec(name="General")); catch err; msg = sprint(showerror, err); occursin("already installed", msg) || occursin("already exists", msg) || rethrow(); end'
      - name: Resolve and build package
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"
        run: |
          julia --project=. -e 'using Pkg; Pkg.resolve(); Pkg.instantiate(); Pkg.build()'
      - name: Run packaged Flight stress lane
        env:
          JULIA_NUM_THREADS: "2"
          WENDAO_ARROW_STRESS_WORKERS: "4"
          WENDAO_ARROW_STRESS_SAMPLES: "4"
          WENDAO_ARROW_STRESS_REQUEST_ROWS: "32"
          WENDAO_ARROW_STRESS_DOC_BYTES: "2097152"
          WENDAO_ARROW_STRESS_PROCESSING_DELAY_MS: "5"
          WENDAO_ARROW_STRESS_MAX_ACTIVE_REQUESTS: "8"
        run: |
          chmod +x ./scripts/test_packaged_flight_stress.sh
          ./scripts/test_packaged_flight_stress.sh
